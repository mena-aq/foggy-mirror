<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foggy Mirror</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Webcam feed (mirrored) -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Fog layer drawn here -->
  <canvas id="fogCanvas"></canvas>

  <!-- Drawing layer (finger traces) -->
  <canvas id="drawCanvas"></canvas>

  <!-- Overlay effects (vignette, etc.) -->
  <canvas id="fxCanvas"></canvas>

  <!-- UI overlays -->
  <div id="ui">
    <div id="statusDot"></div>
    <div id="hint">Open mouth to fog · Draw with finger · Frame hands to capture</div>
    <div id="countdown" class="hidden"></div>
    <div id="flashOverlay" class="hidden"></div>
    <button id="clearFogButton" type="button">Clear fog</button>
  </div>

  <!-- Screenshot preview -->
  <div id="previewWrap" class="hidden">
    <img id="previewImg" alt="captured" />
    <button id="previewClose">✕ Close</button>
    <a id="previewDownload" download="foggy-mirror.png">↓ Save</a>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <!-- App modules -->
  <script type="module" src="main.js"></script>
</body>
</html>
